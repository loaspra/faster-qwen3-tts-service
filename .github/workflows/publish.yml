name: Publish Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/loaspra/faster-qwen3-tts

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}

      - name: Bump deploy manifest
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          sed -i "s/^    newTag: .*/    newTag: ${TAG}/" k8s/kustomization.yaml
          grep -q "newTag: ${TAG}" k8s/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(deploy): release ${TAG}"
          git push origin HEAD:main
